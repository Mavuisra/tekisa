{% extends "web/base.html" %}

{% block content %}
<section class="card" style="padding:18px;background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 55%,#0ea5e9 100%);color:#fff;border:none;">
  <div style="font-size:14px;color:rgba(255,255,255,.82);">Revenu global</div>
  <div style="font-size:28px;font-weight:800;margin-top:4px;">{{ global_revenue }} CDF</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
    <div style="background:rgba(255,255,255,.18);border-radius:999px;padding:6px 10px;font-size:13px;font-weight:600;">Vendeurs: {{ sellers_count }}</div>
    <div style="background:rgba(255,255,255,.18);border-radius:999px;padding:6px 10px;font-size:13px;font-weight:600;">Ventes: {{ sales_count }}</div>
  </div>
</section>
<section style="display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px;margin-top:10px;">
  <div class="card"><div class="muted">Vendeurs actifs</div><div style="font-size:22px;font-weight:800;">{{ sellers_count }}</div></div>
  <div class="card"><div class="muted">Produits total</div><div style="font-size:22px;font-weight:800;">{{ products_count }}</div></div>
  <div class="card"><div class="muted">Ventes total</div><div style="font-size:22px;font-weight:800;">{{ sales_count }}</div></div>
  <div class="card"><div class="muted">CA global</div><div style="font-size:22px;font-weight:800;">{{ global_revenue }} CDF</div></div>
</section>
{% endblock %}
