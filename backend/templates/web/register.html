{% extends "web/auth_base.html" %}

{% block auth_content %}
<form method="post" action="#" class="auth-form">
  {% csrf_token %}
  <div class="field">
    <label for="username">Nom d'utilisateur</label>
    <input id="username" name="username" type="text" placeholder="Ex: VENDEUR01" />
  </div>
  <div class="field">
    <label for="display_name">Nom complet</label>
    <input id="display_name" name="display_name" type="text" placeholder="Ex: Jean Mbuyi" />
  </div>
  <div class="field">
    <label for="company_name">Entreprise</label>
    <input id="company_name" name="company_name" type="text" placeholder="Nom de la société" />
  </div>
  <div class="field">
    <label for="phone">Téléphone</label>
    <input id="phone" name="phone" type="text" placeholder="+243..." />
  </div>
  <div class="field">
    <label for="role">Rôle</label>
    <select id="role" name="role">
      <option value="admin">Admin</option>
      <option value="seller">Seller</option>
      <option value="cashier">Caissier</option>
    </select>
  </div>
  <div class="field">
    <label for="password">Mot de passe</label>
    <input id="password" name="password" type="password" placeholder="Mot de passe" />
  </div>
  <button class="btn" type="submit">Créer mon compte</button>
</form>
{% endblock %}
