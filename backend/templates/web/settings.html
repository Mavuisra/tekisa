{% extends "web/base.html" %}

{% block content %}
<section class="card">
  <h3 class="section-title">Paramètres</h3>
  <p class="muted">Même style mobile pour les informations business et préférences.</p>
</section>
<section class="card" style="margin-top:10px;">
  <div style="display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px;">
    <div>
      <div class="muted">Nom entreprise</div>
      <div style="font-weight:700;margin-top:2px;">{{ company_name }}</div>
    </div>
    <div>
      <div class="muted">Téléphone</div>
      <div style="font-weight:700;margin-top:2px;">{{ phone }}</div>
    </div>
    <div>
      <div class="muted">Province</div>
      <div style="font-weight:700;margin-top:2px;">{{ province }}</div>
    </div>
    <div>
      <div class="muted">Commune</div>
      <div style="font-weight:700;margin-top:2px;">{{ commune }}</div>
    </div>
  </div>
</section>
{% endblock %}
