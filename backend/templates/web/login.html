{% extends "web/auth_base.html" %}

{% block auth_content %}
<form method="post" action="#" class="auth-form">
  {% csrf_token %}
  <div class="field">
    <label for="username">Nom d'utilisateur ou téléphone</label>
    <input id="username" name="username" type="text" value="{{ username_value }}" placeholder="Ex: VENDEUR ou +243..." />
  </div>
  <div class="field">
    <label for="password">Mot de passe</label>
    <input id="password" name="password" type="password" placeholder="Votre mot de passe" />
  </div>
  <button class="btn" type="submit">Se connecter</button>
</form>
{% endblock %}
