<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEKISA - Détail tenant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { tekisa: "#035D8A" },
            borderRadius: { tekisa: "3px" },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900" data-tenant-id="{{ tenant_id|escape }}">
    <div class="min-h-screen">
      <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider text-tekisa">TEKISA Control</p>
            <h1 class="text-xl font-bold">Détail tenant</h1>
            <p id="tenant-id-label" class="text-xs text-slate-500"></p>
          </div>
          <div class="flex items-center gap-2">
            <a href="/super-admin/" class="rounded-tekisa border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">
              Retour dashboard
            </a>
            <button id="refresh-tenant" class="rounded-tekisa bg-tekisa px-3 py-2 text-sm font-semibold text-white hover:bg-cyan-700">
              Actualiser
            </button>
          </div>
        </div>
      </header>

      <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <section id="error-banner" class="mb-4 hidden rounded-tekisa border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"></section>

        <section class="mb-6 grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
          <article class="rounded-tekisa border border-slate-200 bg-white p-4">
            <p class="text-xs font-semibold uppercase text-slate-500">Utilisateurs</p>
            <p id="kpi-users" class="mt-2 text-3xl font-bold text-tekisa">--</p>
          </article>
          <article class="rounded-tekisa border border-slate-200 bg-white p-4">
            <p class="text-xs font-semibold uppercase text-slate-500">Produits</p>
            <p id="kpi-products" class="mt-2 text-3xl font-bold text-tekisa">--</p>
          </article>
          <article class="rounded-tekisa border border-slate-200 bg-white p-4">
            <p class="text-xs font-semibold uppercase text-slate-500">Ventes</p>
            <p id="kpi-sales" class="mt-2 text-3xl font-bold text-tekisa">--</p>
          </article>
          <article class="rounded-tekisa border border-slate-200 bg-white p-4">
            <p class="text-xs font-semibold uppercase text-slate-500">CA Total</p>
            <p id="kpi-revenue" class="mt-2 text-3xl font-bold text-tekisa">--</p>
          </article>
        </section>

        <section class="rounded-tekisa border border-slate-200 bg-white p-4">
          <h2 class="text-sm font-bold uppercase tracking-wide text-slate-600">Profil entreprise complet</h2>
          <div id="tenant-company-details" class="mt-4 grid grid-cols-1 gap-3 text-sm md:grid-cols-2 xl:grid-cols-4"></div>
        </section>

        <section class="mt-6 rounded-tekisa border border-slate-200 bg-white p-4">
          <h2 class="text-sm font-bold uppercase tracking-wide text-slate-600">Utilisateurs du tenant</h2>
          <div class="mt-3 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
              <thead class="border-b border-slate-200 text-xs uppercase text-slate-500">
                <tr>
                  <th class="py-2 pr-3">Username</th>
                  <th class="py-2 pr-3">Role</th>
                  <th class="py-2 pr-3">Telephone</th>
                  <th class="py-2 pr-3">Email</th>
                  <th class="py-2 pr-3">Derniere connexion</th>
                  <th class="py-2 pr-3">Actif</th>
                </tr>
              </thead>
              <tbody id="tenant-users-body" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </section>

        <section class="mt-6 rounded-tekisa border border-slate-200 bg-white p-4">
          <h2 class="text-sm font-bold uppercase tracking-wide text-slate-600">Dernieres ventes</h2>
          <div class="mt-3 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
              <thead class="border-b border-slate-200 text-xs uppercase text-slate-500">
                <tr>
                  <th class="py-2 pr-3">Date</th>
                  <th class="py-2 pr-3">Vendeur</th>
                  <th class="py-2 pr-3">Client</th>
                  <th class="py-2 pr-3">Paiement</th>
                  <th class="py-2 pr-3">Montant</th>
                  <th class="py-2 pr-3">Statut</th>
                </tr>
              </thead>
              <tbody id="tenant-sales-body" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    {% load static %}
    <script src="{% static 'js/super-admin-tenant-detail.js' %}"></script>
  </body>
</html>
