name: cisnetkids
description: "CisnetKids - Suivi scolaire pour les parents (notes, présences, paiements, messages) RDC"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2
  connectivity_plus: ^6.1.1

  # Local storage & auth
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.0.1
  path: ^1.9.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Models & serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Routing
  go_router: ^14.6.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2

  # Animations & UX (promte2)
  lottie: ^3.1.3
  audioplayers: ^6.1.0
  animated_text_kit: ^4.2.2
  confetti: ^0.7.0
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0
  rive: ^0.13.13
  flutter_neumorphic: ^3.2.0
  salomon_bottom_bar: ^3.3.2
  page_transition: ^2.1.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^8.0.2
  pdf: ^3.12.0
  printing: ^5.14.3
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  flutter_phone_direct_caller: ^2.2.1
  record: ^6.2.0
  file_picker: ^10.3.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/tekisa_logo.png
    - assets/images/splash_logo.png
    - assets/images/register_intro.png

flutter_launcher_icons:
  android: true
  image_path_android: assets/images/tekisa_logo.png
  adaptive_icon_background: "#022E9E"
  adaptive_icon_foreground: assets/images/tekisa_logo.png
