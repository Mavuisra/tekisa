version: '3.9'

services:
  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - ../.env
    volumes:
      - ../backend:/app/backend
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    command: celery -A config worker -l info
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

  beat:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    command: celery -A config beat -l info
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cisnetkids
      POSTGRES_USER: cisnetkids
      POSTGRES_PASSWORD: cisnetkids
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:

